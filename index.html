@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0d0d;
  --surface: #151515;
  --surface-light: #1d1d1d;
  --text: #f5f0e8;
  --muted: #8a847c;
  --accent: #e8c547;
  --border: rgba(245, 240, 232, .10);
  --serif: "DM Serif Display", serif;
  --sans: "Inter", sans-serif;
  --mono: "JetBrains Mono", monospace;
  --container: 1100px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  max-width: 100%;
  display: block;
}

.container {
  width: min(100% - 48px, var(--container));
  margin: auto;
}

.section {
  padding: 100px 0;
}

.title {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 400;
}

.mono {
  font-family: var(--mono);
  font-size: .75rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .8rem;
  transition: .3s;
}

.btn-primary {
  background: var(--accent);
  color: #111;
}

.btn-primary:hover {
  transform: translateY(-3px);
}

.btn-outline {
  border: 1px solid var(--border);
  color: var(--muted);
}

.btn-outline:hover {
  border-color: var(--accent);
  color: var(--text);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.fade {
  animation: fade .8s ease forwards;
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

/* ===== NAVBAR ===== */
.nav {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: var(--serif);
  font-size: 2rem;
  color: var(--accent);
}

.links {
  display: flex;
  gap: 35px;
  font-family: var(--mono);
  font-size: .8rem;
}

.links a:hover {
  color: var(--accent);
}

.mobile {
  display: none;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

@media(max-width: 700px) {
  .mobile {
    display: block;
  }
  .links {
    display: none;
    position: absolute;
    top: 90px;
    left: 0;
    right: 0;
    background: var(--surface);
    padding: 30px;
    flex-direction: column;
    z-index: 100;
  }
  .links.active {
    display: flex;
  }
}

/* ===== HERO ===== */
.hero {
  min-height: calc(100vh - 90px);
  display: flex;
  align-items: center;
}

.hero-content {
  max-width: 700px;
}

.hero .mono {
  margin-bottom: 20px;
}

.hero h1 {
  font-family: var(--serif);
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 24px;
}

.hero h1 span {
  color: var(--accent);
}

.hero-tagline {
  font-family: var(--serif);
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  color: var(--muted);
  margin-bottom: 24px;
  font-style: italic;
}

.hero p {
  color: var(--muted);
  font-size: 1.1rem;
  max-width: 540px;
  margin-bottom: 40px;
}

.hero p strong {
  color: var(--text);
  font-weight: 600;
}

.hero-actions {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

/* ===== ABOUT ===== */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}

.about-text p {
  color: var(--muted);
  margin-bottom: 20px;
}

.about-text strong {
  color: var(--text);
  font-weight: 600;
}

.about-info {
  margin-top: 40px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  gap: 20px;
}

.info-row .label {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
}

.info-row .value {
  color: var(--muted);
  text-align: right;
}

.skills h3 {
  font-family: var(--serif);
  font-size: 1.5rem;
  margin-bottom: 20px;
}

.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.skill-tag {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .75rem;
}

/* ===== TOOLKIT ===== */
.toolkit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 50px;
}

.toolkit-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
}

.toolkit-item h4 {
  font-family: var(--serif);
  font-size: 1.1rem;
  margin-bottom: 8px;
}

.toolkit-item p {
  color: var(--muted);
  font-size: .85rem;
}

/* ===== PROJECTS ===== */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px;
}

.project-card {
  padding: 30px;
  transition: transform .3s, border-color .3s;
}

.project-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}

.project-number {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--accent);
  margin-bottom: 12px;
}

.project-card h3 {
  font-family: var(--serif);
  font-size: 1.4rem;
  margin-bottom: 12px;
}

.project-card p {
  color: var(--muted);
  font-size: .95rem;
  margin-bottom: 20px;
}

.project-tech {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.project-tech span {
  background: var(--surface-light);
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .7rem;
}

.project-links {
  display: flex;
  gap: 16px;
}

.project-links a {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--accent);
  transition: opacity .3s;
}

.project-links a:hover {
  opacity: .7;
}

.coming-soon {
  opacity: .6;
}

/* ===== CONTACT ===== */
.contact-section {
  text-align: center;
}

.contact-section .title {
  margin-bottom: 20px;
}

.contact-section p {
  color: var(--muted);
  margin-bottom: 40px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.contact-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.contact-info {
  margin-top: 60px;
  padding-top: 40px;
  border-top: 1px solid var(--border);
}

.contact-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 30px;
  text-align: left;
}

.contact-info-item .label {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.contact-info-item a {
  color: var(--muted);
  transition: color .3s;
}

.contact-info-item a:hover {
  color: var(--text);
}

/* ===== RESPONSIVE ===== */
@media(max-width: 700px) {
  .section {
    padding: 70px 0;
  }
  .container {
    width: min(100% - 32px, var(--container));
  }
  .about-grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  .hero-actions {
    flex-direction: column;
  }
  .toolkit-grid {
    grid-template-columns: 1fr;
  }
  .contact-info-grid {
    grid-template-columns: 1fr;
  }
  .info-row {
    flex-direction: column;
    gap: 4px;
  }
  .info-row .value {
    text-align: left;
  }
}
