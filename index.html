<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kenawak Ephrem - Frontend Developer specializing in React, TypeScript and modern web applications." />
  <meta name="author" content="Kenawak Ephrem" />
  <meta property="og:title" content="Kenawak Ephrem | Frontend Developer" />
  <meta property="og:description" content="Frontend developer building responsive and modern web applications." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='12' fill='%23e8c547'/%3E%3Ctext x='50' y='65' font-family='serif' font-size='48' font-weight='bold' text-anchor='middle' fill='%230d0d0d'%3EKE%3C/text%3E%3C/svg%3E" />
  <title>Kenawak Ephrem | Frontend Developer</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0d0d;
  --surface: #151515;
  --surface-light: #1d1d1d;
  --text: #f5f0e8;
  --muted: #8a847c;
  --accent: #e8c547;
  --border: rgba(245, 240, 232, .10);
  --serif: "DM Serif Display", serif;
  --sans: "Inter", sans-serif;
  --mono: "JetBrains Mono", monospace;
  --container: 1100px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  max-width: 100%;
  display: block;
}

.container {
  width: min(100% - 48px, var(--container));
  margin: auto;
}

.section {
  padding: 100px 0;
}

.title {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 400;
}

.mono {
  font-family: var(--mono);
  font-size: .75rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .8rem;
  transition: .3s;
}

.btn-primary {
  background: var(--accent);
  color: #111;
}

.btn-primary:hover {
  transform: translateY(-3px);
}

.btn-outline {
  border: 1px solid var(--border);
  color: var(--muted);
}

.btn-outline:hover {
  border-color: var(--accent);
  color: var(--text);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.fade {
  animation: fade .8s ease forwards;
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

/* ===== NAVBAR STYLES (moved from Navbar.tsx) ===== */
.nav {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: var(--serif);
  font-size: 2rem;
  color: var(--accent);
}

.links {
  display: flex;
  gap: 35px;
  font-family: var(--mono);
  font-size: .8rem;
}

.links a:hover {
  color: var(--accent);
}

.mobile {
  display: none;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

@media(max-width: 700px) {
  .mobile {
    display: block;
  }

  .links {
    display: none;
    position: absolute;
    top: 90px;
    left: 0;
    right: 0;
    background: var(--surface);
    padding: 30px;
    flex-direction: column;
    z-index: 100;
  }

  .links.active {
    display: flex;
  }
}

/* ===== PAGE STYLES ===== */
.hero {
  min-height: calc(100vh - 90px);
  display: flex;
  align-items: center;
}

.hero-content {
  max-width: 700px;
}

.hero .mono {
  margin-bottom: 20px;
}

.hero h1 {
  font-family: var(--serif);
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 24px;
}

.hero h1 span {
  color: var(--accent);
}

.hero p {
  color: var(--muted);
  font-size: 1.1rem;
  max-width: 540px;
  margin-bottom: 40px;
}

.hero-actions {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}

.about-text p {
  color: var(--muted);
  margin-bottom: 20px;
}

.skills h3 {
  font-family: var(--serif);
  font-size: 1.5rem;
  margin-bottom: 20px;
}

.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.skill-tag {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .75rem;
}

.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px;
}

.project-card {
  padding: 30px;
  transition: transform .3s, border-color .3s;
}

.project-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}

.project-card h3 {
  font-family: var(--serif);
  font-size: 1.4rem;
  margin-bottom: 12px;
}

.project-card p {
  color: var(--muted);
  font-size: .95rem;
  margin-bottom: 20px;
}

.project-tech {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.project-tech span {
  background: var(--surface-light);
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .7rem;
}

.project-links {
  display: flex;
  gap: 16px;
}

.project-links a {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--accent);
  transition: opacity .3s;
}

.project-links a:hover {
  opacity: .7;
}

.contact-section {
  text-align: center;
}

.contact-section .title {
  margin-bottom: 20px;
}

.contact-section p {
  color: var(--muted);
  margin-bottom: 40px;
}

.contact-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

@media(max-width: 700px) {
  .section {
    padding: 70px 0;
  }

  .container {
    width: min(100% - 32px, var(--container));
  }

  .about-grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .hero-actions {
    flex-direction: column;
  }
}
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const projects = [
      { title: "LifeOS", description: "Personal productivity dashboard built with React, TypeScript and modern frontend architecture. Includes task management, analytics visualization and responsive UI.", tech: ["React", "TypeScript", "Vite", "Tailwind", "Zustand"], demo: "https://zaniel1st.github.io/lifeos/", github: "https://github.com/zaniel1st/lifeos" },
      { title: "AgriLink AI", description: "AgriTech platform concept connecting farmers and buyers through a modern responsive interface.", tech: ["HTML", "CSS", "JavaScript"], demo: "https://zaniel1st.github.io/AgriLink/", github: "https://github.com/zaniel1st/AgriLink" },
      { title: "Coffee Shop Digital Storefront", description: "A responsive business website designed for a local coffee shop with menu and customer interaction features.", tech: ["HTML", "CSS", "JavaScript"], demo: "https://dailygrindcoffeehouse.netlify.app/", github: "https://github.com/zaniel1st/dailygrindcoffehouse" }
    ];

    const skills = ["React", "TypeScript", "JavaScript", "HTML5", "CSS3", "Tailwind CSS", "Vite", "Git", "GitHub", "Responsive Design", "UI/UX", "Framer Motion", "Zustand"];

    let currentPath = window.location.hash.slice(1) || '/';

    function navigate(path) {
      window.location.hash = path;
    }

    window.addEventListener('hashchange', () => {
      currentPath = window.location.hash.slice(1) || '/';
      render();
    });

    function render() {
      const app = document.getElementById('app');

      const isOpen = window.menuOpen || false;

      const navLinks = [
        { path: '/', label: 'Home' },
        { path: '/about', label: 'About' },
        { path: '/projects', label: 'Projects' },
        { path: '/contact', label: 'Contact' }
      ];

      let linksHtml = navLinks.map(l => 
        '<a href="#' + l.path + '" onclick="window.menuOpen=false">' + l.label + '</a>'
      ).join('');

      const navbarHtml = `
        <header>
          <nav class="container nav">
            <a href="#/" class="logo">KE.</a>
            <button class="mobile" onclick="toggleMenu()" aria-label="Toggle menu">
              ${isOpen ? '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>'}
            </button>
            <div class="${isOpen ? 'links active' : 'links'}">
              ${linksHtml}
            </div>
          </nav>
        </header>
      `;

      const footerHtml = `
        <footer class="container section">
          <p class="mono">&copy; 2026 Kenawak Ephrem &middot; Built with React + TypeScript</p>
        </footer>
      `;

      let pageHtml = '';

      if (currentPath === '/') {
        pageHtml = `
          <section class="hero container">
            <div class="hero-content fade">
              <p class="mono">Frontend Developer</p>
              <h1>Hi, I'm <span>Kenawak Ephrem</span></h1>
              <p>I build responsive, performant web applications with React and TypeScript. Passionate about clean code, modern UI, and great user experiences.</p>
              <div class="hero-actions">
                <a href="#/projects" class="btn btn-primary">View Projects <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:6px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
                <a href="#/contact" class="btn btn-outline">Get in Touch</a>
              </div>
            </div>
          </section>
        `;
      } else if (currentPath === '/about') {
        pageHtml = `
          <section class="container section fade">
            <p class="mono" style="margin-bottom:16px">About Me</p>
            <h2 class="title" style="margin-bottom:40px">Who I Am</h2>
            <div class="about-grid">
              <div class="about-text">
                <p>I'm Kenawak Ephrem, a frontend developer focused on building modern, accessible, and performant web applications. I enjoy turning complex problems into simple, beautiful interface designs.</p>
                <p>My journey in web development started with a curiosity for how things work on the web, which quickly grew into a passion for crafting user-centered digital experiences. I specialize in the React ecosystem and love staying up to date with the latest frontend technologies.</p>
                <p>When I'm not coding, you'll find me exploring new design trends, contributing to open-source projects, or learning something new.</p>
              </div>
              <div class="skills">
                <h3>Tech Stack</h3>
                <div class="skill-tags">
                  ${skills.map(s => '<span class="skill-tag">' + s + '</span>').join('')}
                </div>
              </div>
            </div>
          </section>
        `;
      } else if (currentPath === '/projects') {
        const projectsHtml = projects.map(p => `
          <div class="card project-card">
            <h3>${p.title}</h3>
            <p>${p.description}</p>
            <div class="project-tech">
              ${p.tech.map(t => '<span>' + t + '</span>').join('')}
            </div>
            <div class="project-links">
              <a href="${p.demo}" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;vertical-align:middle"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Live Demo
              </a>
              <a href="${p.github}" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;vertical-align:middle"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                Source Code
              </a>
            </div>
          </div>
        `).join('');

        pageHtml = `
          <section class="container section fade">
            <p class="mono" style="margin-bottom:16px">Portfolio</p>
            <h2 class="title" style="margin-bottom:50px">Selected Projects</h2>
            <div class="projects-grid">
              ${projectsHtml}
            </div>
          </section>
        `;
      } else if (currentPath === '/contact') {
        pageHtml = `
          <section class="container section contact-section fade">
            <p class="mono" style="margin-bottom:16px">Contact</p>
            <h2 class="title">Let's Work Together</h2>
            <p>I'm currently open to new opportunities and collaborations. Whether you have a project in mind or just want to say hello, feel free to reach out.</p>
            <div class="contact-links">
              <a href="mailto:kenawakephrem@gmail.com" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Email Me
              </a>
              <a href="https://github.com/zaniel1st" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                GitHub
              </a>
              <a href="https://linkedin.com/in/kenawak-ephrem" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                LinkedIn
              </a>
              <a href="https://twitter.com/kenawakephrem" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
                Twitter
              </a>
            </div>
          </section>
        `;
      }

      app.innerHTML = navbarHtml + '<main>' + pageHtml + '</main>' + footerHtml;
    }

    function toggleMenu() {
      window.menuOpen = !window.menuOpen;
      render();
    }

    window.menuOpen = false;
    render();
  </script>
</body>
</html>
