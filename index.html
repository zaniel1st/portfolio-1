<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kenawak Ephrem - Frontend Developer specializing in React, TypeScript and modern web applications." />
  <meta name="author" content="Kenawak Ephrem" />
  <meta property="og:title" content="Kenawak Ephrem | Frontend Developer" />
  <meta property="og:description" content="Frontend developer building responsive and modern web applications." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="./favicon.svg" />
  <title>Kenawak Ephrem | Frontend Developer</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0d0d;
  --surface: #151515;
  --surface-light: #1d1d1d;
  --text: #f5f0e8;
  --muted: #8a847c;
  --accent: #e8c547;
  --border: rgba(245, 240, 232, .10);
  --serif: "DM Serif Display", serif;
  --sans: "Inter", sans-serif;
  --mono: "JetBrains Mono", monospace;
  --container: 1100px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  max-width: 100%;
  display: block;
}

.container {
  width: min(100% - 48px, var(--container));
  margin: auto;
}

.section {
  padding: 100px 0;
}

.title {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 400;
}

.mono {
  font-family: var(--mono);
  font-size: .75rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .8rem;
  transition: .3s;
}

.btn-primary {
  background: var(--accent);
  color: #111;
}

.btn-primary:hover {
  transform: translateY(-3px);
}

.btn-outline {
  border: 1px solid var(--border);
  color: var(--muted);
}

.btn-outline:hover {
  border-color: var(--accent);
  color: var(--text);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.fade {
  animation: fade .8s ease forwards;
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

/* ===== NAVBAR STYLES (moved from Navbar.tsx) ===== */
.nav {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: var(--serif);
  font-size: 2rem;
  color: var(--accent);
}

.links {
  display: flex;
  gap: 35px;
  font-family: var(--mono);
  font-size: .8rem;
}

.links a:hover {
  color: var(--accent);
}

.mobile {
  display: none;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

@media(max-width: 700px) {
  .mobile {
    display: block;
  }

  .links {
    display: none;
    position: absolute;
    top: 90px;
    left: 0;
    right: 0;
    background: var(--surface);
    padding: 30px;
    flex-direction: column;
    z-index: 100;
  }

  .links.active {
    display: flex;
  }
}

/* ===== PAGE STYLES ===== */
.hero {
  min-height: calc(100vh - 90px);
  display: flex;
  align-items: center;
}

.hero-content {
  max-width: 700px;
}

.hero .mono {
  margin-bottom: 20px;
}

.hero h1 {
  font-family: var(--serif);
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 24px;
}

.hero h1 span {
  color: var(--accent);
}

.hero p {
  color: var(--muted);
  font-size: 1.1rem;
  max-width: 540px;
  margin-bottom: 40px;
}

.hero-actions {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}

.about-text p {
  color: var(--muted);
  margin-bottom: 20px;
}

.skills h3 {
  font-family: var(--serif);
  font-size: 1.5rem;
  margin-bottom: 20px;
}

.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.skill-tag {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .75rem;
}

.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px;
}

.project-card {
  padding: 30px;
  transition: transform .3s, border-color .3s;
}

.project-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}

.project-card h3 {
  font-family: var(--serif);
  font-size: 1.4rem;
  margin-bottom: 12px;
}

.project-card p {
  color: var(--muted);
  font-size: .95rem;
  margin-bottom: 20px;
}

.project-tech {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.project-tech span {
  background: var(--surface-light);
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: .7rem;
}

.project-links {
  display: flex;
  gap: 16px;
}

.project-links a {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--accent);
  transition: opacity .3s;
}

.project-links a:hover {
  opacity: .7;
}

.contact-section {
  text-align: center;
}

.contact-section .title {
  margin-bottom: 20px;
}

.contact-section p {
  color: var(--muted);
  margin-bottom: 40px;
}

.contact-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

@media(max-width: 700px) {
  .section {
    padding: 70px 0;
  }

  .container {
    width: min(100% - 32px, var(--container));
  }

  .about-grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .hero-actions {
    flex-direction: column;
  }
}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./assets/index.js"></script>
</body>
</html>
